<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Catálogo Embajadora</title>
    <link rel="icon" type="img/png" href="./favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox-plus-jquery.min.js"></script>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="banner">
          <div class="logo">
            <img
              src="./favicon.png"
              alt="logo"
              style="
                width: 150%;
                height: 150%;
                margin-right: 37px;
                margin-left: 40px;
              "
            />
          </div>
          <h1>Catálogo Embajadora</h1>
        </div>
      </div>
      <div style="font-size: 12px; color: var(--gray)">
        Retail de productos para el hogar, cocina y descanso
      </div>
    </header>
    <main>
      <!-- <section class="hero">
        <div class="hero-left hero-card">
          <h2>Frutos secos para cada ocasión</h2>
          <p style="color: var(--muted)">
            Confitados, salados, mixtos o premium: selecciona la presentación y
            llévate lo mejor de la naturaleza.
          </p>
        </div>
      </section> -->

      <section>
        <h3 style="margin-bottom: 8px">Productos</h3>
        <div>
          <nav>
            <div class="search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path
                  d="M21 21l-4.35-4.35"
                  stroke="#666"
                  stroke-width="1.6"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
                <circle
                  cx="11"
                  cy="11"
                  r="5"
                  stroke="#666"
                  stroke-width="1.6"
                ></circle>
              </svg>
              <input
                id="q"
                type="search"
                placeholder="Buscar: Plumones, Sábanas,..."
              />
            </div>
          </nav>
        </div>
        <div class="hero-search">
          <div class="card filters">
            <select id="filterType">
              <option value="all">Todas las categorías</option>
              <option value="Buzo">Buzo</option>
              <option value="Cocina">Cocina</option>
              <option value="Cojín">Cojín</option>
              <option value="Frazadas">Frazadas</option>
              <option value="Pijama">Pijama</option>
              <option value="Plumón">Plumón</option>
              <option value="Sábana">Sábana</option>
              <option value="Toallas">Toallas</option>
              <option value="Otros">Otros</option>
            </select>
            <!-- </div>
                <div class="card filters"> -->
            <select id="sortBy">
              <option value="default">Orden recomendado</option>
              <option value="price-asc">Precio: bajo a alto</option>
              <option value="price-desc">Precio: alto a bajo</option>
            </select>
          </div>
        </div>
        <div id="products" class="products"></div>
      </section>
    </main>

    <footer>
      <small>© <span id="year"></span> Frutos Secos · La Fran</small>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
